// ── TRIAL BALANCE ENGINE ──────────────────────────────────────
function classifyCode(code){const c=String(code||"").trim().charAt(0);return({1:"asset",2:"liability",3:"equity",4:"revenue",5:"expense"}[c])||"unknown";}
function subType(code){const c=String(code||"").trim();if(c.startsWith("11"))return"fixed_asset";if(c.startsWith("12"))return"current_asset";if(c.startsWith("21"))return"current_liability";if(c.startsWith("51"))return"cogs";if(c.startsWith("52"))return"ga";if(c.startsWith("53"))return"depreciation";if(c.startsWith("54"))return"other_exp";return classifyCode(code);}
function buildCOA(raw){const map={};(raw||[]).forEach(item=>{const a=item.JournalAccount||item.AccountPlan||item;const id=String(a.id||a.account_id||"");if(!id)return;const code=String(a.code||a.account_number||a.account_code||id);map[id]={id,code,name:a.name||a.account_name||`#${id}`,type:classifyCode(code),sub:subType(code)};});return map;}
function extractLines(item){const j=item.Journal||item;const lines=j.JournalLine||j.journal_lines||j.lines||item.JournalLine||[];if(Array.isArray(lines))return lines;if(lines&&typeof lines==="object")return Object.values(lines);return[];}
function parseAccountsData(raw){if(!raw)return[];try{const d=typeof raw==="string"?JSON.parse(raw):raw;return Array.isArray(d)?d:[];}catch{return[];}}
function addToTB(tb,aid,dr,cr,coa){if(!tb[aid]){const acc=coa[aid]||{};tb[aid]={id:aid,code:acc.code||aid,name:acc.name||`#${aid}`,type:acc.type||"unknown",sub:acc.sub||"unknown",debit:0,credit:0};}tb[aid].debit+=dr;tb[aid].credit+=cr;}
function buildTrialBalance(journals,coa,expenses,incomes,invoices,purchases){
  const tb={};let hasLines=false;
  journals.forEach(item=>{const lines=extractLines(item);if(lines.length>0)hasLines=true;lines.forEach(line=>{const aid=String(line.journal_account_id||line.account_id||"");if(!aid)return;addToTB(tb,aid,parseFloat(line.debit||line.dr||0),parseFloat(line.credit||line.cr||0),coa);});});
  if(!hasLines){
    expenses.forEach(exp=>{
      const lines=parseAccountsData(exp.accounts_data);const amount=parseFloat(exp.amount||0);
      if(lines.length>0){lines.forEach(line=>{const aid=String(line.journal_account_id||"");if(!aid)return;const dr=parseFloat(line.debit||line.amount||0)||amount;addToTB(tb,aid,dr,0,coa);});}
      else if(exp.journal_account_id){addToTB(tb,String(exp.journal_account_id),amount,0,coa);}
      else{if(!tb["_exp_misc"])tb["_exp_misc"]={id:"_exp_misc",code:"52",name:"مصروفات متنوعة",type:"expense",sub:"ga",debit:0,credit:0};tb["_exp_misc"].debit+=amount;}
    });
    invoices.forEach(inv=>{const a=parseFloat(inv.summary_total||inv.amount||0);if(!a)return;if(!tb["_rev"])tb["_rev"]={id:"_rev",code:"41",name:"إيرادات المبيعات",type:"revenue",sub:"revenue",debit:0,credit:0};tb["_rev"].credit+=a;});
    purchases.forEach(pur=>{const a=parseFloat(pur.summary_total||pur.amount||0);if(!a)return;if(!tb["_cogs"])tb["_cogs"]={id:"_cogs",code:"51",name:"تكلفة المشتريات",type:"expense",sub:"cogs",debit:0,credit:0};tb["_cogs"].debit+=a;});
    incomes.forEach(inc=>{const a=parseFloat(inc.amount||0);if(!a)return;if(!tb["_eq"])tb["_eq"]={id:"_eq",code:"31",name:"تمويل الشركاء",type:"equity",sub:"equity",debit:0,credit:0};tb["_eq"].credit+=a;});
  }
  return{tb,hasLines};
}
function calcFinancials(tb,tres){
  const accs=Object.values(tb);
  const sumSub=(s,dr=true)=>Math.max(accs.filter(a=>a.sub===s).reduce((t,a)=>t+(dr?a.debit-a.credit:a.credit-a.debit),0),0);
  const sumType=(s,dr=true)=>accs.filter(a=>a.type===s).reduce((t,a)=>t+(dr?a.debit-a.credit:a.credit-a.debit),0);
  const revenue=Math.max(sumType("revenue",false),0),cogs=sumSub("cogs"),ga=sumSub("ga"),depn=sumSub("depreciation");
  const otherExp=Math.max(accs.filter(a=>a.type==="expense"&&!["cogs","ga","depreciation"].includes(a.sub)).reduce((t,a)=>t+(a.debit-a.credit),0),0);
  const totalExp=cogs+ga+depn+otherExp,grossProfit=revenue-cogs,ebit=grossProfit-ga-depn,pbt=ebit-otherExp,tax=Math.max(pbt*0.225,0),np=pbt-tax;
  const fixedAssets=sumSub("fixed_asset"),currentAssets=sumSub("current_asset"),totalAssets=fixedAssets+currentAssets;
  const liabilities=Math.max(sumType("liability",false),0),equity=Math.max(sumType("equity",false),0);
  const financing=Math.max(accs.filter(a=>a.type==="equity").reduce((t,a)=>t+(a.credit-a.debit),0),0);
  const cash=tres.reduce((s,t)=>s+t.balance,0),burn=totalExp>0?totalExp/12:0,runway=burn>0?cash/burn:0;
  const gm=revenue>0?(grossProfit/revenue)*100:0,nm=revenue>0?(np/revenue)*100:0,ebitM=revenue>0?(ebit/revenue)*100:0;
  const expBreakdown=accs.filter(a=>a.type==="expense"&&(a.debit-a.credit)>0).map(a=>({name:a.name,code:a.code,amount:a.debit-a.credit,sub:a.sub})).sort((a,b)=>b.amount-a.amount);
  const equityItems=accs.filter(a=>a.type==="equity"&&(a.credit-a.debit)>0).map(a=>({name:a.name,amount:a.credit-a.debit})).sort((a,b)=>b.amount-a.amount);
  const totalL_E=liabilities+equity;const balanced=Math.abs(totalAssets-totalL_E)<1;
  return{revenue,cogs,ga,depn,otherExp,totalExp,grossProfit,ebit,pbt,tax,np,gm,nm,ebitM,fixedAssets,currentAssets,totalAssets,liabilities,equity,financing,cash,burn,runway,expBreakdown,equityItems,totalL_E,balanced};
}
