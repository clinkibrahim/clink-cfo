// ══════════════════════════════════════════════════════════
// DAFTRA RESPONSE PARSER
// دفترة تُرجع بنى مختلفة — نجرب الكل
// ══════════════════════════════════════════════════════════
function parseResp(raw, key) {
  if (!raw) return [];
  if (Array.isArray(raw.data))      return raw.data;
  if (Array.isArray(raw[key]))      return raw[key];
  const lk = key[0].toLowerCase() + key.slice(1);
  if (Array.isArray(raw[lk]))       return raw[lk];
  if (Array.isArray(raw))           return raw;
  if (raw.data && Array.isArray(raw.data[key])) return raw.data[key];
  return [];
}

function statusOf(total, paid, raw) {
  const s = (raw||"").toLowerCase();
  if (["paid","مدفوعة","1","yes"].includes(s)) return "paid";
  if (["partial","جزئي"].includes(s))          return "partial";
  const t = parseFloat(total)||0, p = parseFloat(paid)||0;
  if (t <= 0 || p >= t) return "paid";
  if (p > 0)            return "partial";
  return "unpaid";
}

const mapInv = i => ({
  id:       i.id,
  number:   i.number || i.serial_number || String(i.id),
  client:   i.client_name || i.client?.name || "",

  status:   statusOf(i.total||i.amount, i.paid_amount||i.paid, i.payment_status||i.status),

});

const mapExp = e => ({

const mapSup = s => ({

const mapTre = t => ({

  type:     (t.name||"").match(/بنك|bank/i) ? "bank" : (t.type || "cash"),
});

// ── Period filter ──────────────────────────────────────────
function byPeriod(items, period, f="date") {
  const now = new Date(), y=now.getFullYear(), m=now.getMonth();
  return items.filter(it=>{
    const d = new Date(it[f]);
    if (isNaN(d)) return true;
    if (period==="MTD") return d.getFullYear()===y && d.getMonth()===m;
    if (period==="QTD") return d.getFullYear()===y && Math.floor(d.getMonth()/3)===Math.floor(m/3);
    return d.getFullYear()===y;
  });
}

function App() {
  const [lang,   setLang]   = useState("AR");

  const [period, setPeriod] = useState("YTD");
  const [page,   setPage]   = useState("home");
  const [showM,  setShowM]  = useState(false);
  const [width,  setWidth]  = useState(window.innerWidth);

  // ── AUTH & DATA ─────────────────────────────────────────
  // mode: "demo" | "loading" | "connected" | "error"
  const [mode,      setMode]      = useState("demo");
  const [data,      setData]      = useState(DEMO);
  const [token,     setToken]     = useState(null);
  const [tokenType, setTokenType] = useState("bearer");
  const [subdomain, setSubdomain] = useState("");
  const [lastSync,  setLastSync]  = useState(null);
  const [loadMsg,   setLoadMsg]   = useState("");
  const [fetchLog,  setFetchLog]  = useState([]);
  const [toasts,    setToasts]    = useState([]);
  const autoRef = useRef(null);

  // ── API KEY MANUAL INPUT ─────────────────────────────────
  const [showApiModal, setShowApiModal] = useState(false);
  const [inputKey,     setInputKey]     = useState("");
  const [inputSub,     setInputSub]     = useState("");

  const ar  = lang==="AR";
  const dir = ar?"rtl":"ltr";
  const SY  = ar?money.s:money.sE;
  const mob = width<640;
  const tab = width>=640&&width<1024;
  const SW  = mob?0:tab?58:220;

  useEffect(()=>{
    const fn=()=>setWidth(window.innerWidth);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  const toast = useCallback((msg,type="info")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  // ── FETCH ONE DAFTRA ENDPOINT ───────────────────────────
  const fetchEndpoint = useCallback(async (endpoint)=>{
    const p = new URLSearchParams({apikey:token, endpoint, token_type:tokenType});
    if (subdomain) p.append("subdomain", subdomain);
    const res = await fetch(`/api/daftra?${p}`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.message||json.error||`HTTP ${res.status}`);
    return json;
  },[token,tokenType,subdomain]);

  // ══ LOAD REAL DATA ══════════════════════════════════════
  // ⚠️ المنطق الأساسي: عند الاتصال نمسح Demo ونضع بيانات دفترة فقط
  const loadRealData = useCallback(async ()=>{
    if (!token) return;
    setMode("loading");
    setData(EMPTY);   // ← مسح فوري للـ Demo

    const log=[];

    async function fetchOne(label, endpoint, entityKey, mapFn) {
      setLoadMsg(ar?`جاري جلب ${label}...`:`Loading ${label}...`);
      try {
        const raw   = await fetchEndpoint(endpoint);
        const items = parseResp(raw, entityKey).map(mapFn);
        log.push({label, count:items.length, ok:true});
        return items;
      } catch(e) {
        log.push({label, count:0, ok:false, err:e.message});
        console.error(`[CLink CFO] ${endpoint}:`, e.message);
        return [];  // مصفوفة فارغة — مش Demo
      }
    }

    const invoices         = await fetchOne(ar?"الفواتير":"Invoices",         "invoices",          "Invoices",         mapInv);
    const expenses         = await fetchOne(ar?"المصروفات":"Expenses",         "expenses",          "Expenses",         mapExp);
    const purchaseInvoices = await fetchOne(ar?"فواتير الشراء":"Purchases",    "purchase_invoices", "PurchaseInvoices", mapPur);
    const clients          = await fetchOne(ar?"العملاء":"Clients",            "clients",           "Clients",          mapCli);
    const suppliers        = await fetchOne(ar?"الموردون":"Suppliers",          "suppliers",         "Suppliers",        mapSup);
    const treasuries       = await fetchOne(ar?"الخزينة":"Treasuries",         "treasuries",        "Treasuries",       mapTre);

    // ← هنا نضع البيانات الحقيقية فقط بدون أي Demo
    setData({ invoices, expenses, purchaseInvoices, clients, suppliers, treasuries });
    setFetchLog(log);
    setLastSync(new Date());
    setLoadMsg("");

    const ok  = log.filter(l=>l.ok).length;
    const all = log.length;

    if (ok===all) {
      setMode("connected");
      toast(ar?`✅ تم جلب ${invoices.length} فاتورة من دفترة`:`✅ Loaded ${invoices.length} invoices from Daftra`,"success");
    } else if (ok>0) {
      setMode("connected");
      toast(ar?`⚠️ ${ok}/${all} مصادر — بعض البيانات غير متاحة`:`⚠️ ${ok}/${all} sources loaded`,"warn");
    } else {
      setMode("error");
      setData(EMPTY); // نبقى فارغ مش Demo
      toast(ar?"❌ فشل جلب البيانات — تحقق من الصلاحيات":"❌ Failed to load data","error");
    }
  },[token,ar,fetchEndpoint,toast]);

  // ── READ URL PARAMS ON MOUNT ─────────────────────────────
  useEffect(()=>{
    // استرجاع الجلسة
    try {
      const saved=sessionStorage.getItem("clink_cfo_v4");
      if (saved) {
        const s=JSON.parse(saved);
        if (s.token) { setToken(s.token); setTokenType(s.tt||"bearer"); setSubdomain(s.sd||""); return; }
      }
    } catch {}
    const params=new URLSearchParams(window.location.search);
    const auth=params.get("auth");
    if (auth==="success") {
      const tk=params.get("token")||"";
      const tt=(params.get("token_type")||"bearer").toLowerCase();
      const sd=params.get("subdomain")||"";
      if (tk) {
        setToken(tk); setTokenType(tt); setSubdomain(sd);
        sessionStorage.setItem("clink_cfo_v4",JSON.stringify({token:tk,tt,sd}));
        window.history.replaceState({},"","/");
      }
    } else if (auth==="error") {
      setMode("error");
      const reason=params.get("reason")||"unknown";
      toast(ar?`❌ فشل الاتصال: ${reason}`:`❌ Failed: ${reason}`,"error");
      window.history.replaceState({},"","/");
    }
  },[]);

  // ── TRIGGER LOAD WHEN TOKEN READY ───────────────────────
  useEffect(()=>{ if(token) loadRealData(); },[token]);

  // ── AUTO REFRESH 5 MIN ───────────────────────────────────
  useEffect(()=>{
    clearInterval(autoRef.current);
    if (token&&mode==="connected") autoRef.current=setInterval(loadRealData,5*60*1000);
    return()=>clearInterval(autoRef.current);
  },[token,mode,loadRealData]);

  // ── DISCONNECT ───────────────────────────────────────────
  const disconnect=()=>{
    clearInterval(autoRef.current);
    sessionStorage.removeItem("clink_cfo_v4");
    setToken(null); setSubdomain(""); setMode("demo");
    setData(DEMO); setFetchLog([]);  // ← نرجع Demo عند قطع الاتصال
    toast(ar?"تم قطع الاتصال — وضع تجريبي":"Disconnected — Demo mode","info");
  };

  const loginDaftra=()=>{
    const rd=encodeURIComponent(window.location.origin+"/callback");
    window.location.href=`https://app.daftra.com/oauth/authorize?client_id=565&redirect_uri=${rd}&response_type=code`;
  };

  // ── CONNECT WITH MANUAL API KEY ──────────────────────────
  const connectWithApiKey=()=>{
    const key=inputKey.trim();
    const sub=inputSub.trim();
    if(!key){toast(ar?"أدخل الـ API Key أولاً":"Please enter your API Key","error");return;}
    setToken(key);
    setTokenType("apikey");
    setSubdomain(sub);
    sessionStorage.setItem("clink_cfo_v4",JSON.stringify({token:key,tt:"apikey",sd:sub}));
    setShowApiModal(false);
    setInputKey(""); setInputSub("");
    toast(ar?"✅ جاري الاتصال...":"✅ Connecting...","success");
  };

  // ── API KEY MODAL ────────────────────────────────────────
  const ApiModal=()=>el("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    el("div",{style:{background:"white",borderRadius:16,padding:"24px 28px",width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",animation:"fadeIn .3s"}},
      el("div",{style:{fontSize:16,fontWeight:800,color:G.goldD,marginBottom:6}},
        "🔑 "+(ar?"إدخال API Key من دفترة":"Enter Daftra API Key")),
      el("div",{style:{fontSize:11,color:G.txtF,marginBottom:20,lineHeight:1.7}},
        ar?"اذهب إلى دفترة ← إعدادات الحساب ← API Key وانسخه هنا"
          :"Go to Daftra → Account Settings → API Key and paste it here"),
      // API Key input
      el("div",{style:{marginBottom:14}},
        el("label",{style:{fontSize:11,fontWeight:700,color:G.txt,display:"block",marginBottom:5}},
          ar?"🔑 الـ API Key (مطلوب)":"🔑 API Key (required)"),
        el("input",{
          type:"text", value:inputKey,
          onChange:e=>setInputKey(e.target.value),
          placeholder:ar?"الصق الـ API Key هنا...":"Paste your API Key here...",
          style:{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${G.bdr}`,fontSize:12,fontFamily:"'Cairo',sans-serif",outline:"none",direction:"ltr"},
          onKeyDown:e=>e.key==="Enter"&&connectWithApiKey(),
        })
      ),
      // Subdomain input
      el("div",{style:{marginBottom:20}},
        el("label",{style:{fontSize:11,fontWeight:700,color:G.txt,display:"block",marginBottom:5}},
          ar?"🌐 اسم الشركة في دفترة (اختياري)":"🌐 Company subdomain (optional)"),
        el("div",{style:{display:"flex",alignItems:"center",gap:6}},
          el("input",{
            type:"text", value:inputSub,
            onChange:e=>setInputSub(e.target.value),
            placeholder:ar?"مثال: mycompany":"e.g. mycompany",
            style:{flex:1,padding:"10px 12px",borderRadius:8,border:`1.5px solid ${G.bdr}`,fontSize:12,fontFamily:"'Cairo',sans-serif",outline:"none",direction:"ltr"},
          }),
          el("span",{style:{fontSize:11,color:G.txtF,whiteSpace:"nowrap"}},".daftra.com")
        ),
        el("div",{style:{fontSize:10,color:G.txtF,marginTop:4}},
          ar?"الرابط الموجود في متصفحك عند فتح دفترة"
            :"The subdomain shown in your browser when using Daftra")
      ),
      // Buttons
      el("div",{style:{display:"flex",gap:10}},
        el("button",{

  }),[data,period]);

  const kpi = useMemo(()=>{
    const rev  = fd.invoices.reduce((s,i)=>s+i.amount,0);
    const paid = fd.invoices.reduce((s,i)=>s+i.paid,0);
    const exp  = fd.expenses.reduce((s,e)=>s+e.amount,0);
    const pur  = fd.purchaseInvoices.reduce((s,p)=>s+p.amount,0);
    const purPaid = fd.purchaseInvoices.reduce((s,p)=>s+p.paid,0);
    const gp   = rev-pur, np=gp-exp;
    const cash = data.treasuries.reduce((s,t)=>s+(t.currency==="EGP"?t.balance:t.balance*50),0);
    const ovAR = data.clients.reduce((s,c)=>s+(c.overdue||0),0);
    const ovAP = data.suppliers.reduce((s,s2)=>s+(s2.overdue||0),0);
    return {
      rev, paid, ar_bal:rev-paid,
      exp, pur, ap_bal:pur-purPaid,
      gp, np,
      gm:rev>0?(gp/rev)*100:0,
      nm:rev>0?(np/rev)*100:0,
      coll:rev>0?(paid/rev)*100:0,
      cash, ovAR, ovAP,
      invCount:fd.invoices.length,

        el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
          el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:12}},"📄 "+(ar?"الفواتير":"Invoices")),
          fd.invoices.length===0
            ?el(Empty,{msg:ar?"لا توجد فواتير في هذه الفترة":"No invoices for this period"})
            :el("div",{style:{overflowX:"auto"}},
                el("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:320}},
                  el("thead",null,el("tr",null,[ar?"رقم":"#",ar?"العميل":"Client",ar?"المبلغ":"Amount",ar?"الحالة":"Status"].map(h=>el(TH,{key:h,h})))),
                  el("tbody",null,
                    fd.invoices.map((inv,i)=>el("tr",{key:i,style:{background:i%2===0?G.sur:"white"}},
                      el(TD,{sm:true,c:G.txtF},inv.number),
                      el(TD,{bold:true},ar?inv.client:inv.clientEn),
                      el(TD,{c:G.inf,bold:true},`${fmt(inv.amount)} ${SY}`),
                      el("td",{style:{padding:"7px 10px",borderBottom:`1px solid ${G.bdrS}`}},
                        el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:(inv.status==="paid"?G.pos:inv.status==="partial"?G.wrn:G.neg)+"18",color:inv.status==="paid"?G.pos:inv.status==="partial"?G.wrn:G.neg,border:`1px solid ${(inv.status==="paid"?G.pos:inv.status==="partial"?G.wrn:G.neg)}30`}},
                          inv.status==="paid"?(ar?"مدفوعة":"Paid"):inv.status==="partial"?(ar?"جزئي":"Partial"):(ar?"مستحقة":"Due"))
                      )
                    )),
                    el("tr",{style:{background:G.goldL}},
                      el("td",{colSpan:2,style:{padding:"8px 10px",fontSize:11,fontWeight:800,color:G.goldD,borderTop:`2px solid ${G.bdr}`}},ar?"الإجمالي":"Total"),
                      el("td",{style:{padding:"8px 10px",fontSize:12,fontWeight:900,color:G.inf,borderTop:`2px solid ${G.bdr}`}},`${fmt(kpi.rev)} ${SY}`),
                      el("td",{style:{borderTop:`2px solid ${G.bdr}`}})
                    )
                  )
                )
              )
        ),
        // Expenses
        el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
          el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:12}},"📊 "+(ar?"المصروفات":"Expenses")),
          fd.expenses.length===0
            ?el(Empty,{msg:ar?"لا توجد مصروفات":"No expenses"})
            :el("div",null,
                Object.entries(cats).map(([cat,amt],i)=>el("div",{key:i,style:{marginBottom:12}},
                  el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                    el("span",{style:{fontSize:11,color:G.txt,fontWeight:600}},cat),
                    el("span",{style:{fontSize:11,fontWeight:700,color:G.neg}},`${fmt(amt)} ${SY}`)
                  ),
                  el(Hbar,{v:amt,mx,c:G.neg})
                )),
                el("div",{style:{marginTop:14,padding:"9px 12px",background:G.neg+"08",borderRadius:8,display:"flex",justifyContent:"space-between",borderTop:`2px solid ${G.bdr}`}},
                  el("span",{style:{fontSize:12,fontWeight:700,color:G.txtD}},ar?"إجمالي المصروفات":"Total Expenses"),
                  el("span",{style:{fontSize:13,fontWeight:800,color:G.neg}},`${fmt(kpi.exp)} ${SY}`)
                )
              )
        )
      )
    );
  };

  // ══ PAGE: AR ═════════════════════════════════════════════
  const PageAR=()=>{
    const unpaid=fd.invoices.filter(i=>i.status!=="paid");
    return el("div",{style:{animation:"fadeIn .4s"}},
      el("div",{style:{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:12,marginBottom:16}},
        el(Card,{label:ar?"إجمالي الذمم":"Total AR",      val:`${fmt(kpi.ar_bal)} ${SY}`,   c:G.inf}),
        el(Card,{label:ar?"متأخرة السداد":"Overdue",       val:`${fmt(kpi.ovAR)} ${SY}`,    c:G.neg}),
        el(Card,{label:ar?"نسبة التحصيل":"Collection",     val:`${fmtD(kpi.coll)}%`,        c:kpi.coll>=80?G.pos:G.wrn}),
      ),
      el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd,marginBottom:14}},
        el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:14}},"◆ "+(ar?"تحليل العملاء":"Client Analysis")),
        data.clients.length===0
          ?el(Empty,{msg:ar?"لا يوجد عملاء — اتصل بدفترة":"No clients — connect Daftra"})
          :data.clients.map((c,i)=>el("div",{key:i,style:{padding:"11px 14px",borderBottom:`1px solid ${G.bdrS}`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
              el("div",{style:{flex:1,minWidth:100}},
                el("div",{style:{fontSize:12,fontWeight:700,color:G.txt}},ar?c.name:c.nameEn),
                c.overdue>0&&el("div",{style:{fontSize:9,color:G.neg,marginTop:2}},ar?`متأخر منذ ${c.days} يوم`:`${c.days}d overdue`)
              ),
              el("div",{style:{textAlign:"center",minWidth:90}},
                el("div",{style:{fontSize:13,fontWeight:800,color:c.balance>0?G.inf:G.pos}},`${fmt(c.balance)} ${SY}`),
                el("div",{style:{fontSize:9,color:G.txtF}},ar?"مستحق":"Outstanding")
              ),
              c.overdue>0&&el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:(c.days>30?G.neg:G.wrn)+"18",color:c.days>30?G.neg:G.wrn,border:`1px solid ${(c.days>30?G.neg:G.wrn)}30`}},ar?`⚠ ${c.days}ي`:`⚠ ${c.days}d`)
            ))
      ),
      el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
        el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:12}},ar?"الفواتير غير المسددة":"Outstanding Invoices"),
        unpaid.length===0
          ?el("div",{style:{padding:"20px",textAlign:"center",color:G.pos,fontWeight:700,fontSize:13}},ar?"✅ جميع الفواتير مسددة!":"✅ All invoices paid!")
          :el("div",{style:{overflowX:"auto"}},
              el("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:380}},
                el("thead",null,el("tr",null,[ar?"رقم":"#",ar?"العميل":"Client",ar?"المبلغ":"Amount",ar?"المدفوع":"Paid",ar?"الباقي":"Remaining",ar?"الحالة":"Status"].map(h=>el(TH,{key:h,h})))),
                el("tbody",null,unpaid.map((inv,i)=>el("tr",{key:i,style:{background:i%2===0?G.sur:"white"}},
                  el(TD,{sm:true,c:G.txtF},inv.number),
                  el(TD,{bold:true},ar?inv.client:inv.clientEn),
                  el(TD,{c:G.inf,bold:true},`${fmt(inv.amount)} ${SY}`),
                  el(TD,{c:G.pos,bold:true},`${fmt(inv.paid)} ${SY}`),
                  el(TD,{c:G.neg,bold:true},`${fmt(inv.amount-inv.paid)} ${SY}`),
                  el("td",{style:{padding:"7px 10px",borderBottom:`1px solid ${G.bdrS}`}},
                    el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:(inv.status==="partial"?G.wrn:G.neg)+"18",color:inv.status==="partial"?G.wrn:G.neg,border:`1px solid ${(inv.status==="partial"?G.wrn:G.neg)}30`}},
                      inv.status==="partial"?(ar?"جزئي":"Partial"):(ar?"مستحقة":"Due")))
                )))
              )
            )
      )
    );
  };

  // ══ PAGE: AP ═════════════════════════════════════════════
  const PageAP=()=>el("div",{style:{animation:"fadeIn .4s"}},
    el("div",{style:{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:12,marginBottom:16}},
      el(Card,{label:ar?"المستحق للموردين":"Total AP",    val:`${fmt(kpi.ap_bal)} ${SY}`,  c:G.wrn}),
      el(Card,{label:ar?"متأخرة":"Overdue AP",             val:`${fmt(kpi.ovAP)} ${SY}`,   c:G.neg}),
      el(Card,{label:ar?"إجمالي المشتريات":"Purchases",    val:`${fmt(kpi.pur)} ${SY}`,    c:G.inf}),
    ),
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:14}},"◎ "+(ar?"الموردون":"Suppliers")),
      data.suppliers.length===0
        ?el(Empty,{msg:ar?"لا يوجد موردون":"No suppliers"})
        :data.suppliers.map((s,i)=>el("div",{key:i,style:{padding:"11px 14px",borderBottom:`1px solid ${G.bdrS}`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
            el("div",{style:{flex:1}},
              el("div",{style:{fontSize:12,fontWeight:700,color:G.txt}},ar?s.name:s.nameEn),
              s.overdue>0&&el("div",{style:{fontSize:9,color:G.neg,marginTop:2}},ar?`متأخر ${s.days} يوم`:`${s.days}d overdue`)
            ),
            el("div",{style:{textAlign:"center"}},
              el("div",{style:{fontSize:13,fontWeight:800,color:s.balance>0?G.wrn:G.pos}},`${fmt(s.balance)} ${SY}`),
              el("div",{style:{fontSize:9,color:G.txtF}},ar?"المستحق":"Owed")
            ),
            s.overdue>0&&el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:G.neg+"18",color:G.neg,border:`1px solid ${G.neg}30`}},ar?"⚠ متأخر":"⚠ Overdue")
          ))
    ),
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
      el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,marginBottom:12}},ar?"فواتير الشراء":"Purchase Invoices"),
      fd.purchaseInvoices.length===0
        ?el(Empty,{msg:ar?"لا توجد فواتير شراء":"No purchase invoices"})
        :el("div",{style:{overflowX:"auto"}},
            el("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:360}},
              el("thead",null,el("tr",null,[ar?"المورد":"Supplier",ar?"المبلغ":"Amount",ar?"المدفوع":"Paid",ar?"الباقي":"Remaining",ar?"الحالة":"Status"].map(h=>el(TH,{key:h,h})))),
              el("tbody",null,fd.purchaseInvoices.map((p,i)=>el("tr",{key:i,style:{background:i%2===0?G.sur:"white"}},
                el(TD,{bold:true},ar?p.supplier:p.supplierEn),
                el(TD,{c:G.wrn,bold:true},`${fmt(p.amount)} ${SY}`),
                el(TD,{c:G.pos,bold:true},`${fmt(p.paid)} ${SY}`),
                el(TD,{c:G.neg,bold:true},`${fmt(p.amount-p.paid)} ${SY}`),
                el("td",{style:{padding:"7px 10px",borderBottom:`1px solid ${G.bdrS}`}},
                  el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:(p.status==="paid"?G.pos:p.status==="partial"?G.wrn:G.neg)+"18",color:p.status==="paid"?G.pos:p.status==="partial"?G.wrn:G.neg,border:`1px solid ${(p.status==="paid"?G.pos:p.status==="partial"?G.wrn:G.neg)}30`}},
                    p.status==="paid"?(ar?"مدفوعة":"Paid"):p.status==="partial"?(ar?"جزئي":"Partial"):(ar?"مستحقة":"Due"))
                )
              )))
            )
          )
    )
  );

  // ══ PAGE: TREASURY ════════════════════════════════════════
  const PageTreasury=()=>el("div",{style:{animation:"fadeIn .4s"}},
    el("div",{style:{background:`linear-gradient(135deg,${G.pos},#145214)`,borderRadius:14,padding:"14px 18px",marginBottom:16,color:"white",boxShadow:`0 4px 16px ${G.pos}50`}},
      el("div",{style:{fontSize:11,opacity:.85}},ar?"إجمالي الخزينة والبنوك":"Total Treasury & Banks"),
      el("div",{style:{fontSize:28,fontWeight:900,marginTop:4}},`${fmt(kpi.cash)} ${SY}`)
    ),
    data.treasuries.length===0
      ?el(Empty,{msg:ar?"لا توجد خزائن — اتصل بدفترة":"No treasuries — connect Daftra"})
      :el("div",{style:{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(2,1fr)",gap:14}},
          data.treasuries.map((t,i)=>el("div",{key:i,style:{background:"white",border:`1px solid ${G.bdr}`,borderTop:`3px solid ${t.type==="bank"?G.inf:G.gold}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
            el("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
              el("span",{style:{fontSize:24}},t.type==="bank"?"🏦":"💵"),
              el("div",null,
                el("div",{style:{fontSize:13,fontWeight:700,color:G.txt}},ar?t.name:t.nameEn),
                el("div",{style:{fontSize:10,color:G.txtF}},t.type==="bank"?(ar?"حساب بنكي":"Bank Account"):(ar?"خزينة نقدية":"Cash Vault"))
              )
            ),
            el("div",{style:{fontSize:24,fontWeight:900,color:t.type==="bank"?G.inf:G.gold,marginBottom:10}},`${fmt(t.balance)} ${t.currency}`),
            el(Hbar,{v:t.balance,mx:Math.max(...data.treasuries.map(x=>x.balance),1),c:t.type==="bank"?G.inf:G.gold,h:8})
          ))
        )
  );

  // ══ PAGE: REPORTS ═════════════════════════════════════════
  const PageReports=()=>el("div",{style:{animation:"fadeIn .4s"}},
    fetchLog.length>0&&el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"14px 16px",boxShadow:G.shd,marginBottom:14}},
      el("div",{style:{fontSize:12,fontWeight:700,color:G.goldD,marginBottom:10}},"📡 "+(ar?"سجل جلب البيانات من دفترة":"Daftra Fetch Log")),
      el("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        fetchLog.map((l,i)=>el("span",{key:i,style:{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:(l.ok?G.pos:G.neg)+"18",color:l.ok?G.pos:G.neg,border:`1px solid ${(l.ok?G.pos:G.neg)}30`}},
          `${l.ok?"✅":"❌"} ${l.label}: ${l.count}`))
      )
    ),
    el("div",{style:{background:"white",border:`1px solid ${G.bdr}`,borderRadius:14,padding:"16px 18px",boxShadow:G.shd}},
      el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}},
        el("div",{style:{fontSize:13,fontWeight:700,color:G.goldD,display:"flex",alignItems:"center",gap:8}},
          "✦ "+(ar?"التقرير المالي":"Financial Report")," ",
          el("span",{style:{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:10,fontWeight:700,background:(mode==="connected"?G.pos:G.wrn)+"18",color:mode==="connected"?G.pos:G.wrn,border:`1px solid ${(mode==="connected"?G.pos:G.wrn)}30`}},
            mode==="connected"?(ar?"بيانات حقيقية":"Live Data"):(ar?"تجريبي":"Demo"))
        ),
        el("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
          el("button",{onClick:()=>window.print(),style:{padding:"7px 12px",borderRadius:7,border:`1px solid ${G.bdr}`,background:G.sur,color:G.txtD,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"🖨 "+(ar?"طباعة":"Print")),
          el("button",{onClick:exportCSV,style:{padding:"7px 12px",borderRadius:7,border:`1px solid ${G.pos}50`,background:"#F0FFF0",color:G.pos,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"📊 Excel"),
          el("button",{onClick:()=>window.print(),style:{padding:"7px 12px",borderRadius:7,border:`1px solid ${G.gold}`,background:G.goldL,color:G.goldD,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"📄 PDF")
        )
      ),
      el("div",{style:{overflowX:"auto"}},
        el("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:420}},
          el("thead",null,el("tr",null,[ar?"المؤشر":"KPI",ar?"القيمة":"Value",ar?"المعيار":"Benchmark",ar?"الحالة":"Status"].map(h=>el(TH,{key:h,h})))),
          el("tbody",null,[
            [ar?"إجمالي الإيرادات":"Revenue",    `${fmt(kpi.rev)} ${SY}`,   "—",    true],
            [ar?"إجمالي الربح":"Gross Profit",   `${fmt(kpi.gp)} ${SY}`,    "≥40%", kpi.gm>=40],
            [ar?"هامش الربح الإجمالي":"GM",      `${fmtD(kpi.gm)}%`,        "≥40%", kpi.gm>=40],
            [ar?"صافي الربح":"Net Profit",       `${fmt(kpi.np)} ${SY}`,    "≥0",   kpi.np>=0],
            [ar?"هامش الصافي":"Net Margin",      `${fmtD(kpi.nm)}%`,        "≥15%", kpi.nm>=15],
            [ar?"الذمم المدينة":"AR",             `${fmt(kpi.ar_bal)} ${SY}`,"—",    true],
            [ar?"الذمم الدائنة":"AP",             `${fmt(kpi.ap_bal)} ${SY}`,"—",    true],
            [ar?"نسبة التحصيل":"Collection",     `${fmtD(kpi.coll)}%`,      "≥80%", kpi.coll>=80],
            [ar?"إجمالي الخزينة":"Cash",          `${fmt(kpi.cash)} ${SY}`,  "≥0",   kpi.cash>=0],
          ].map(([n,v,b,ok],i)=>el("tr",{key:i,style:{background:i%2===0?G.sur:"white"}},
            el(TD,{bold:true},n),
            el("td",{style:{padding:"8px 12px",fontSize:12,color:G.gold,fontWeight:700,borderBottom:`1px solid ${G.bdrS}`}},v),
            el("td",{style:{padding:"8px 12px",fontSize:11,color:G.txtF,borderBottom:`1px solid ${G.bdrS}`}},b),
            el("td",{style:{padding:"8px 12px",borderBottom:`1px solid ${G.bdrS}`}},
              el("span",{style:{display:"inline-block",padding:"1px 6px",borderRadius:20,fontSize:9,fontWeight:700,background:(ok?G.pos:G.wrn)+"18",color:ok?G.pos:G.wrn,border:`1px solid ${(ok?G.pos:G.wrn)}30`}},ok?"✅ OK":"⚠️ Review")
            )
          )))
        )
      )
    )
  );

  // ══ RENDER ═══════════════════════════════════════════════
  return el("div",{style:{minHeight:"100vh",background:G.bg,color:G.txt,fontFamily:"'Cairo',sans-serif",direction:dir}},
    mode==="loading"&&el(LoadingOverlay),
    showApiModal&&el(ApiModal),
    !mob&&el(Sidebar),
    mob&&el(BottomNav),
    el("main",{style:{[ar?"marginRight":"marginLeft"]:SW,minHeight:"100vh"}},
      el(ConnBar),
      el(Header),
      el("div",{style:{padding:mob?"12px 12px 90px":"16px 18px"}},
        page==="home"    &&el(PageHome),
        page==="pl"      &&el(PagePL),
        page==="ar"      &&el(PageAR),
        page==="ap"      &&el(PageAP),
        page==="treasury"&&el(PageTreasury),
        page==="reports" &&el(PageReports),
      ),
      !mob&&el("div",{className:"np",style:{padding:"8px 18px",borderTop:`1px solid ${G.bdrS}`,display:"flex",justifyContent:"space-between",fontSize:9,color:G.txtF}},
        el("span",null,`IFRS • ${ar?money.n:money.nE} • FY 2025/2026`),
        el("span",{style:{color:G.gold,fontWeight:700}},"CLink· CFO v4.0 | InvestorProHub 2026")
      )
    ),
    el(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(el(App));
</script>
</body>
</html>
