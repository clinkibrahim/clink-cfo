// ── DAFTRA OAUTH ───────────────────────────────────────────
const DAFTRA = {
  CLIENT_ID: "565",
  REDIRECT:  "https://clink-cfo.vercel.app/callback",
  startOAuth() {
    window.location.href = `https://app.daftra.com/oauth/authorize?client_id=${this.CLIENT_ID}&redirect_uri=${encodeURIComponent(this.REDIRECT)}&response_type=code`;
  },
  getToken()    { try{return sessionStorage.getItem("cfo_token");}catch{return null;} },
  getSub()      { try{return sessionStorage.getItem("cfo_sub");}catch{return null;} },
  save(t,s)     { try{sessionStorage.setItem("cfo_token",t);if(s)sessionStorage.setItem("cfo_sub",s);}catch{} },
  clear()       { try{sessionStorage.removeItem("cfo_token");sessionStorage.removeItem("cfo_sub");}catch{} },

  async api(token, sub, endpoint) {
    // يجرب Bearer ثم apikey
    for (const type of ["bearer","apikey"]) {
      try {
        const headers = type==="bearer"
          ? {Authorization:`Bearer ${token}`, Accept:"application/json"}
          : {apikey:token, Accept:"application/json"};
        const base = sub ? `https://${sub}.daftra.com` : "https://app.daftra.com";
        const r = await fetch(`${base}/api2/${endpoint}`, {headers});
        if (r.ok) {
          const d = await r.json();
          if (d && (d.data !== undefined)) return d;
        }
      } catch {}
    }
    // Fallback: عبر الـ proxy
    for (const type of ["bearer","apikey"]) {
      try {
        const url = `/api/daftra?subdomain=${encodeURIComponent(sub||"")}&apikey=${encodeURIComponent(token)}&endpoint=${encodeURIComponent(endpoint)}&token_type=${type}`;
        const r = await fetch(url);
        if (r.ok) {
          const d = await r.json();
          if (d && d.data !== undefined) return d;
        }
      } catch {}
    }
    return {data:[]};
  },

  async fetchAll(token, sub) {
    const [inv, exp, inc] = await Promise.all([
      this.api(token, sub, "invoices.json?limit=500"),
      this.api(token, sub, "expenses.json?limit=500"),
      this.api(token, sub, "incomes.json?limit=500"),
    ]);
    return {
      invoices: inv.data||[],
      expenses: exp.data||[],
      incomes:  inc.data||[],
    };
  },
};

// ── PROCESS REAL DATA ──────────────────────────────────────
const buildRealData = (invoices, expenses, incomes) => {
  const now = new Date();
  const months = Array.from({length:12},(_,i)=>{
    const d = new Date(now.getFullYear(), now.getMonth()-11+i, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  });

  const monthKey = v => {
    if (!v) return null;
    const d = new Date(v);
    return isNaN(d) ? null : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  };

  const byMonth = items => {
    const map = {};
    items.forEach(raw => {
      const o = raw.Invoice||raw.Expense||raw.Income||raw;
      const k = monthKey(o.date||o.issue_date||o.created||o.modified);
      const v = parseFloat(o.total||o.net_total||o.amount||o.subtotal||o.grand_total||0);
      if (k && v>0) map[k]=(map[k]||0)+v;
    });
    return months.map(m => Math.round((map[m]||0)/1000*10)/10);
  };

  const rev  = byMonth(invoices);
  const exp2 = byMonth(expenses);
  const inc2 = byMonth(incomes);
  const revT = rev.map((r,i)=>Math.round((r+inc2[i])*10)/10);
  const cogs = revT.map(r=>Math.round(r*0.55*10)/10);
  const opex = exp2.map(e=>Math.round(e*0.60*10)/10);
  const ga   = exp2.map(e=>Math.round(e*0.40*10)/10);
  const ar   = revT.map(r=>Math.round(r*0.30*10)/10);
  const ap   = exp2.map(e=>Math.round(e*0.25*10)/10);
  let cash=500;
  const cashA = revT.map((r,i)=>{
    cash=Math.max(50, cash+r-exp2[i]);
    return Math.round(cash*10)/10;
  });
  const emp = Array(12).fill(DEMO.emp[11]);
  const totalRev = revT.reduce((a,b)=>a+b,0);
  const totalExp = exp2.reduce((a,b)=>a+b,0);
  return {
    rev:revT,cogs,opex,ga,ar,ap,cash:cashA,emp,
    hasData: totalRev>0||totalExp>0||invoices.length>0,
    counts:{inv:invoices.length,exp:expenses.length},
    months: revT.filter(v=>v>0).length,
  };
};

// ── CALCS ──────────────────────────────────────────────────
const pIdx = p=>p==="MTD"?[11]:p==="QTD"?[9,10,11]:Array.from({length:12},(_,i)=>i);
const pArr = (arr,p)=>pIdx(p).map(i=>arr[i]||0);
const pSum = (arr,p)=>pArr(arr,p).reduce((a,b)=>a+b,0);
const fmt  = n=>new Intl.NumberFormat("ar-EG").format(Math.round(n));
const fmtD = (n,d=1)=>new Intl.NumberFormat("ar-EG",{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);

const calcK = (period,D) => {
  const r=pSum(D.rev,period),cg=pSum(D.cogs,period);
  const ox=pSum(D.opex,period),ga=pSum(D.ga,period);
  const gp=r-cg,op=gp-ox,eb=op-ga,tx=eb*.225,nt=eb-tx;
  const cash=D.cash[D.cash.length-1]||0;
  const ar=D.ar[D.ar.length-1]||0;
  const ap=D.ap[D.ap.length-1]||0;
  const emp=D.emp?D.emp[11]:50;
  const bn=(pSum(D.opex,"YTD")+pSum(D.ga,"YTD"))/12||1;
  const rw=bn>0?cash/(bn*.8):12;
  const ca=cash+ar+480,cl=ap+280;
  const fR=D.rev.reduce((a,b)=>a+b,0)||1;
  const fC=D.cogs.reduce((a,b)=>a+b,0)||1;
  const idx2=pIdx(period);
  const prev=D.rev.slice(Math.max(0,idx2[0]-idx2.length),idx2[0]).reduce((a,b)=>a+b,0);
  return {
    r,cg,ox,ga,gp,op,eb,nt,tx,cash,ar,ap,emp,bn,rw,
    gm:r>0?(gp/r)*100:0, nm:r>0?(nt/r)*100:0,
    em:r>0?(eb/r)*100:0, xr:r>0?(ox/r)*100:0, gr:r>0?(ga/r)*100:0,
    cr:ca/cl, qr:(cash+ar)/cl, wc:ca-cl,
    dso:ar/(fR/365), dpo:ap/(fC/365),
    grow:prev>0?((r-prev)/prev)*100:0,
    revPerEmp:r>0?r*1000/emp:0,
  };
};

// ── UI ─────────────────────────────────────────────────────
const Bdg=({t,c=G.gold,sm})=>(
  <span style={{display:"inline-block",padding:sm?"1px 6px":"2px 9px",borderRadius:20,background:c+"18",color:c,border:`1px solid ${c}30`,fontSize:sm?9:11,fontWeight:700}}>{t}</span>
);
const Hbar=({v,mx,c=G.gold,h=6})=>(
  <div style={{height:h,background:G.sur2,borderRadius:3,overflow:"hidden",flex:1}}>
    <div style={{height:"100%",width:`${Math.min((v/mx)*100,100)}%`,background:c,borderRadius:3}}/>
  </div>
);
const Sp=({d,c,h=24,w=120})=>{
  if(!d||!d.length)return null;
  const mx=Math.max(...d),mn=Math.min(...d),rng=mx-mn||1;
  const pts=d.map((v,i)=>`${(i/(d.length-1))*w},${h-((v-mn)/rng)*h}`).join(" ");
  return <svg width={w} height={h} style={{overflow:"visible"}}>
    <polyline points={`0,${h} ${pts} ${w},${h}`} fill={c+"22"}/>
    <polyline points={pts} fill="none" stroke={c} strokeWidth="1.5"/>
    <circle cx={w} cy={h-((d[d.length-1]-mn)/rng)*h} r="2.5" fill={c}/>
  </svg>;
};
const Chart=({series,h=160,mons})=>{
  const all=series.flatMap(s=>s.d);
  const mx=Math.max(...all,1)*1.1;
  const lp=d=>d.map((v,i)=>`${i===0?"M":"L"} ${40+i*(640/(d.length-1))},${18+(h-34)-(v/mx)*(h-34)}`).join(" ");
  return <svg viewBox={`0 0 700 ${h}`} style={{width:"100%",height:h}}>
    {[0,.5,1].map((p,i)=><line key={i} x1="40" x2="690" y1={18+(h-34)*p} y2={18+(h-34)*p} stroke={G.bdrS} strokeDasharray="3 5"/>)}
    {[0,.5,1].map((p,i)=><text key={i} x="35" y={21+(h-34)*p} fill={G.txtF} fontSize="9" textAnchor="end">{fmt(mx*(1-p))}</text>)}
    {series.map((s,i)=><path key={i} d={lp(s.d)} fill="none" stroke={s.c} strokeWidth="2.5" strokeDasharray={s.dash||"none"}/>)}
    {mons&&mons.map((m,i)=><text key={i} x={40+i*(640/(mons.length-1))} y={h-2} fill={G.txtF} fontSize="9" textAnchor="middle">{m}</text>)}
  </svg>;
};

function App() {
  const {mob,tab}=useScreen();
  const [page,    setPage]    = useState("dash");
  const [lang,    setLang]    = useState("AR");
  const [money,   setMoney]   = useState(CURR[0]);
  const [period,  setPeriod]  = useState("YTD");
  const [showM,   setShowM]   = useState(false);
  const [showConn,setShowConn]= useState(false);
  const [conn,    setConn]    = useState({sub:"",key:"",status:"demo",token:""});
  const [connMsg, setConnMsg] = useState("");
  const [realData,setRealData]= useState(null);
  const [loading, setLoading] = useState(false);

  const ar  = lang==="AR";
  const dir = ar?"rtl":"ltr";
  const SY  = ar?money.s:money.sE;
  const UN  = ar?`ألف ${money.s}`:`K ${money.sE}`;
  const D   = useMemo(()=>realData||DEMO,[realData]);
  const k   = useMemo(()=>calcK(period,D),[period,D]);
  const cRev= useMemo(()=>pArr(D.rev,period),[period,D]);
  const cC  = useMemo(()=>pArr(D.cogs,period),[period,D]);
  const cO  = useMemo(()=>pArr(D.opex,period),[period,D]);
  const cG  = useMemo(()=>pArr(D.ga,period),[period,D]);
  const prf = cRev.map((v,i)=>v-cC[i]-cO[i]-cG[i]);
  const cMs = useMemo(()=>pIdx(period).map(i=>ar?MAR[i]:MEN[i]),[period,lang]);
  const SW  = mob?0:tab?58:220;

  // ── OAuth callback handler ───────────────────────────────
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const auth=params.get("auth");
    if(auth==="success"||auth==="code"){
      const token=params.get("token")||params.get("code");
      const sub=params.get("subdomain")||"";
      if(token){
        DAFTRA.save(token,sub);
        setConn(c=>({...c,status:"connected",token,sub}));
        window.history.replaceState({},"","/");
        setTimeout(()=>doFetch(token,sub),800);
      }
    } else if(auth==="error"){
      setConnMsg(ar?`❌ فشل: ${params.get("reason")||""}`:`❌ Failed: ${params.get("reason")||""}`);
      window.history.replaceState({},"","/");
    }
    const t=DAFTRA.getToken(), s=DAFTRA.getSub();
    if(t&&!auth){
      setConn(c=>({...c,status:"connected",token:t,sub:s||""}));
      setTimeout(()=>doFetch(t,s||""),600);
    }
  },[]);

  // ── Fetch real data ──────────────────────────────────────
  const doFetch=async(token,sub)=>{
    if(!token)return;
    setLoading(true);
    try{
      const fin=await DAFTRA.fetchAll(token,sub);
      console.log("Daftra fetched:",fin.invoices.length,"inv,",fin.expenses.length,"exp");
      const rd=buildRealData(fin.invoices,fin.expenses,fin.incomes);
      if(rd.hasData){
        setRealData(rd);
        setConnMsg(ar?`✅ ${rd.counts.inv} فاتورة | ${rd.counts.exp} مصروف`:`✅ ${rd.counts.inv} invoices | ${rd.counts.exp} expenses`);
      } else {
        setConnMsg(ar?"⚠️ لا توجد بيانات مالية في الفترة الحالية":"⚠️ No financial data in current period");
      }
    }catch(e){
      setConnMsg(ar?`❌ ${e.message}`:`❌ ${e.message}`);
    }finally{
      setLoading(false);
    }
  };

  const connectOAuth=()=>DAFTRA.startOAuth();
  const connectKey=async()=>{
    if(!conn.sub||!conn.key){setConnMsg(ar?"أدخل البيانات":"Enter credentials");return;}
    setConn(c=>({...c,status:"connecting"}));
    DAFTRA.save(conn.key,conn.sub);
    setConn(c=>({...c,status:"connected",token:conn.key}));
    setShowConn(false);
    await doFetch(conn.key,conn.sub);
  };
  const disconnect=()=>{
    DAFTRA.clear();
    setConn({sub:"",key:"",status:"demo",token:""});
    setRealData(null);
    setConnMsg("");
  };

  const doExcel=()=>{
    const rows=BUDGET.map(r=>{const v=r.a-r.b;return[(ar?r.ar:r.en),r.b,r.a,v,((v/r.b)*100).toFixed(1)+"%"].join(",");});
    const csv=["Item,Budget,Actual,Variance,Var%",...rows].join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));
    a.download="CLink_CFO.csv";a.click();
  };

  // ── KPI Card ─────────────────────────────────────────────
  const KPI=({label,val,sub,trend,sp,c})=>(
    <div style={{background:"white",border:`1px solid ${G.bdr}`,borderTop:`3px solid ${c}`,borderRadius:14,padding:"13px 15px",boxShadow:G.shd||"0 2px 12px rgba(200,168,75,0.12)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <div style={{fontSize:10,color:G.txtF,fontWeight:600,flex:1,lineHeight:1.3}}>{label}</div>
        {trend!==undefined&&<Bdg t={(trend>=0?"▲":"▼")+fmtD(Math.abs(trend))+"%"} c={trend>=0?G.pos:G.neg} sm/>}
      </div>
      <div style={{fontSize:mob?15:20,fontWeight:800,color:c,marginBottom:2}}>{val}</div>
      {sub&&<div style={{fontSize:10,color:G.txtF,marginBottom:4}}>{sub}</div>}
      {sp&&<Sp d={sp} c={c} w={mob?90:120}/>}
    </div>
  );

  // ── Sidebar ───────────────────────────────────────────────
  const Sidebar=()=>(
    <div style={{width:SW,position:"fixed",top:0,[ar?"right":"left"]:0,bottom:0,background:"white",zIndex:20,borderLeft:ar?`1px solid ${G.bdr}`:"none",borderRight:!ar?`1px solid ${G.bdr}`:"none",display:"flex",flexDirection:"column"}}>
      <div style={{padding:tab?"10px 6px":"12px 14px",borderBottom:`1px solid ${G.bdrS}`}}>
        <svg width={tab?32:26} height={tab?32:26} viewBox="0 0 48 48">
          <rect width="48" height="48" rx="11" fill={G.gold}/>
          <path d="M 33.19 14.81 A 13 13 0 1 0 33.19 33.19" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round"/>
          <circle cx="33.19" cy="14.81" r="3" fill="white"/><circle cx="33.19" cy="33.19" r="3" fill="white"/>
          <line x1="36" y1="14.81" x2="43" y2="14.81" stroke="white" strokeWidth="1.5" strokeDasharray="2 2" opacity=".7"/>
          <line x1="36" y1="33.19" x2="43" y2="33.19" stroke="white" strokeWidth="1.5" strokeDasharray="2 2" opacity=".7"/>
          <circle cx="44.5" cy="24" r="2" fill="white" opacity=".85"/>
        </svg>
        {!tab&&<div style={{marginTop:6}}><div style={{fontSize:14,fontWeight:900,color:G.goldD,lineHeight:1,fontFamily:"Georgia,serif"}}>CLink<span style={{color:G.gold}}>·</span></div><div style={{fontSize:8,color:G.gold,letterSpacing:2,fontWeight:700}}>CFO DASHBOARD</div></div>}
      </div>
      <nav style={{flex:1,padding:tab?"8px 4px":"10px 8px",overflowY:"auto"}}>
        {NAV.map(n=>(
          <div key={n.id} onClick={()=>setPage(n.id)} style={{display:"flex",alignItems:"center",gap:tab?0:8,justifyContent:tab?"center":"flex-start",padding:tab?"10px":"8px 10px",borderRadius:8,marginBottom:2,cursor:"pointer",background:page===n.id?G.goldP:"transparent",border:`1px solid ${page===n.id?G.gold+"50":"transparent"}`,color:page===n.id?G.gold:G.txtF,fontWeight:page===n.id?700:400,fontSize:12}}>
            <span style={{fontSize:14}}>{n.icon}</span>
            {!tab&&<span>{ar?n.ar:n.en}</span>}
          </div>
        ))}
      </nav>

          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.bdrS}`}}>

                      <div key={c.code} onClick={()=>{setMoney(c);setShowM(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",cursor:"pointer",background:money.code===c.code?G.goldP:"transparent",borderBottom:`1px solid ${G.bdrS}`}}>
                        <span style={{fontSize:20}}>{c.f}</span>
                        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:money.code===c.code?G.goldD:G.txt}}>{ar?c.n:c.nE}</div><div style={{fontSize:10,color:G.txtF}}>{c.s} • {c.sE}</div></div>
                        {money.code===c.code&&<span style={{color:G.gold}}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Connection Modal */}
          {showConn&&(
            <div style={{position:"fixed",inset:0,background:"rgba(30,20,8,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div style={{background:"white",borderRadius:16,padding:28,width:"100%",maxWidth:440,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <div style={{fontSize:17,fontWeight:800,color:G.goldD,marginBottom:4}}>🔗 {ar?"اتصال بدفترة":"Connect to Daftra"}</div>
                <div style={{fontSize:11,color:G.txtF,marginBottom:20}}>{ar?"اتصل لجلب بياناتك الحقيقية":"Connect to load your real financial data"}</div>
                <button onClick={()=>{setShowConn(false);connectOAuth();}} style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${G.gold},${G.goldD})`,color:"white",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <span style={{fontSize:18}}>🔗</span>{ar?"تسجيل دخول بدفترة (موصى به)":"Login with Daftra (Recommended)"}
                </button>
                <div style={{textAlign:"center",fontSize:11,color:G.txtF,marginBottom:10}}>{ar?"— أو API Key يدوي —":"— or manual API Key —"}</div>
                <div style={{marginBottom:10}}>
                  <input value={conn.sub} onChange={e=>setConn(c=>({...c,sub:e.target.value}))} placeholder={ar?"النطاق الفرعي.daftra.com":"subdomain.daftra.com"} style={{width:"100%",padding:"8px 12px",border:`1.5px solid ${G.bdr}`,borderRadius:7,fontSize:12,fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}/>
                  <input type="password" value={conn.key} onChange={e=>setConn(c=>({...c,key:e.target.value}))} placeholder="API Key" style={{width:"100%",padding:"8px 12px",border:`1.5px solid ${G.bdr}`,borderRadius:7,fontSize:12,fontFamily:"inherit",boxSizing:"border-box"}}/>
                </div>
                {connMsg&&<div style={{padding:"7px 10px",borderRadius:7,background:connMsg.includes("✅")?"#F0FFF0":"#FFF0EE",color:connMsg.includes("✅")?G.pos:G.neg,fontSize:11,fontWeight:600,marginBottom:10}}>{connMsg}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setShowConn(false);setConnMsg("");}} style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${G.bdr}`,background:"transparent",color:G.txtF,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{ar?"إلغاء":"Cancel"}</button>
                  <button onClick={connectKey} style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${G.bdr}`,background:"white",color:G.goldD,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>API Key</button>
                </div>
              </div>
            </div>
          )}

          {/* Status Banner */}
          {conn.status==="connected"&&(
            <div style={{background:"#F0FFF0",border:`1px solid ${G.pos}40`,borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}} className="np">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>{loading?"⏳":"🟢"}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:G.pos}}>
                    {loading?(ar?"جاري جلب بياناتك من دفترة...":"Loading your data from Daftra..."):
                     realData?(ar?`✅ بيانات حقيقية — ${realData.counts.inv} فاتورة | ${realData.counts.exp} مصروف`:`✅ Real data — ${realData.counts.inv} invoices | ${realData.counts.exp} expenses`):
                     connMsg||(ar?"متصل — لا توجد بيانات بعد":"Connected — No data yet")}
                  </div>
                  {realData&&<div style={{fontSize:10,color:G.txtF}}>{ar?"الأرقام من حسابك الحقيقي في دفترة":"Numbers from your real Daftra account"}</div>}
                </div>
              </div>
              {!loading&&conn.token&&<button onClick={()=>doFetch(conn.token,conn.sub)} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${G.pos}`,background:"white",color:G.pos,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔄 {ar?"تحديث":"Refresh"}</button>}
            </div>
          )}
          {conn.status!=="connected"&&(
            <div style={{background:G.goldL,border:`1px solid ${G.gold}40`,borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}} className="np">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🟡</span>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:G.goldD}}>{ar?"وضع التجربة — بيانات افتراضية":"Demo Mode — Sample data"}</div>
                  <div style={{fontSize:10,color:G.txtF}}>{ar?"اضغط اتصل بدفترة لجلب بياناتك الحقيقية":"Click Connect to load your real data"}</div>
                </div>
              </div>
              <button onClick={()=>setShowConn(true)} style={{padding:"6px 14px",borderRadius:8,border:"none",background:G.gold,color:"white",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔌 {ar?"اتصل الآن":"Connect Now"}</button>
            </div>
          )}

          {/* Pages */}
          {page==="dash"&&<Dash/>}
          {page==="exp" &&<Exp/>}
          {page==="bud" &&<Bud/>}
          {page==="liq" &&<Liq/>}
          {page==="rep" &&<Rep/>}
          {page==="rev" &&<Dash/>}

          {!mob&&(
            <div className="np" style={{marginTop:18,paddingTop:10,borderTop:`1px solid ${G.bdrS}`,display:"flex",justifyContent:"space-between",fontSize:10,color:G.txtF}}>
              <span>IFRS • {UN} • FY 2025/2026</span>
              <span style={{color:G.gold,fontWeight:700}}>CLink· CFO v6.0 | InvestorProHub</span>
            </div>
          )}
        </main>
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
